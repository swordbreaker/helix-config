# Language configurations

[[language]]
name = "css"
scope = "source.css"
file-types = ["css"]
auto-format = true
formatter = { command = "biome", args = ["format", "--write", "--stdin-file-path", "%{buffer_name}"] }
language-servers = ["vscode-css-language-server", "harper-ls"]

[[language]]
name = "html"
scope = "source.html"
file-types = ["html"]
auto-format = true
formatter = { command = "biome", args = ["format", "--write", "--stdin-file-path", "%{buffer_name}"] }
language-servers = ["vscode-html-language-server", "harper-ls"]

[[language]]
name = "javascript"
scope = "source.javascript"
file-types = ["js", "mjs", "cjs"]
auto-format = true
formatter = { command = "biome", args = ["format", "--write", "--stdin-file-path", "%{buffer_name}"] }
language-servers = ["typescript-language-server", "harper-ls"]

[[language]]
name = "jsx"
scope = "source.jsx"
file-types = ["jsx"]
auto-format = true
formatter = { command = "biome", args = ["format", "--write", "--stdin-file-path", "%{buffer_name}"] }
language-servers = ["typescript-language-server", "harper-ls"]

[[language]]
name = "json"
scope = "source.json"
file-types = ["json"]
auto-format = true
formatter = { command = "biome", args = ["format", "--write", "--stdin-file-path", "%{buffer_name}"] }
language-servers = ["vscode-json-language-server", "harper-ls", "deps-lsp"]

[[language]]
name = "markdown"
scope = "source.markdown"
file-types = ["md"]
auto-format = true
formatter = { command = "biome", args = ["format", "--write", "--stdin-file-path", "%{buffer_name}"] }
language-servers = ["marksman", "markdown-oxide", "harper-ls"]

[[language]]
name = "text"
scope = "source.text"
file-types = ["txt"]
language-servers = ["harper-ls"]

[[language]]
name = "toml"
scope = "source.toml"
formatter = { command = "taplo", args = ["fmt", "-"] }
language-servers = ["deps-lsp", "harper-ls"]

[[language]]
name = "tsx"
scope = "source.tsx"
file-types = ["tsx"]
auto-format = true
formatter = { command = "biome", args = ["format", "--write", "--stdin-file-path", "%{buffer_name}"] }
language-servers = ["typescript-language-server", "harper-ls"]

[[language]]
name = "typescript"
scope = "source.ts"
file-types = ["ts", "mts"]
auto-format = true
formatter = { command = "biome", args = ["format", "--write", "--stdin-file-path", "%{buffer_name}"] }
language-servers = ["typescript-language-server", "harper-ls"]

[[language]]
name = "vue"
scope = "source.vue"
file-types = ["vue"]
auto-format = true
formatter = { command = "biome", args = ["format", "--write", "--stdin-file-path", "%{buffer_name}"] }
language-servers = [
  "typescript-language-server",
  "tailwindcss",
  "vscode-html-language-server",
  "vscode-css-language-server",
  "biome",
  "harper-ls",
]

# Language server configurations

[language-server.biome]
command = "biome"
args = ["lsp-proxy"]

[language-server.deps-lsp]
command = "deps-lsp"
args = ["--stdio"]

[language-server.harper-ls]
command = "harper-ls"
args = ["--stdio"]

[language-server.tailwindcss]
command = "tailwindcss-language-server"
args = ["--stdio"]
root-pattern = ["tailwind.config.js", "tailwind.config.cjs", "postcss.config.js"]
file-types = ["html", "css", "javascript", "typescript", "jsx", "tsx", "vue"]

[language-server.typescript-language-server]
command = "typescript-language-server"
args = ["--stdio"]

[language-server.typescript-language-server.config]
hostInfo = "helix"

[language-server.typescript-language-server.config.typescript]
tsdk = "/usr/lib/node_modules/typescript/lib"

[[language-server.typescript-language-server.config.plugins]]
name = "@vue/typescript-plugin"
location = "/usr/lib/node_modules/@vue/typescript-plugin"
languages = ["vue"]

[language-server.vscode-css-language-server]
command = "vscode-css-language-server"
args = ["--stdio"]

[language-server.vscode-css-language-server.config]
provideFormatter = false

[language-server.vscode-html-language-server]
command = "vscode-html-language-server"
args = ["--stdio"]
