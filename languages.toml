[[language]]
formatter = { command = "biome", args = ["format", "--write", "--stdin-file-path", "%{buffer_name}"] }
auto-format = true
file-types = ["tsx"]
name = "tsx"
scope = "source.tsx"

[[language]]
formatter = { command = "biome", args = ["format", "--write", "--stdin-file-path", "%{buffer_name}"] }
auto-format = true
file-types = ["ts", "mts"]
name = "typescript"
scope = "source.ts"

[[language]]
formatter = { command = "biome", args = ["format", "--write", "--stdin-file-path", "%{buffer_name}"] }
auto-format = true
file-types = ["jsx"]
name = "jsx"
scope = "source.jsx"

[[language]]
auto-format = true
file-types = ["js", "mjs", "cjs"]
formatter = { command = "biome", args = ["format", "--write", "--stdin-file-path", "%{buffer_name}"] }
name = "javascript"
scope = "source.javascript"

[[language]]
auto-format = true
file-types = ["css"]
formatter = { command = "biome", args = ["format", "--write", "--stdin-file-path", "%{buffer_name}"] }
name = "css"
scope = "source.css"

[[language]]
auto-format = true
file-types = ["html"]
formatter = { command = "biome", args = ["format", "--write", "--stdin-file-path", "%{buffer_name}"] }
name = "html"
scope = "source.html"

[[language]]
